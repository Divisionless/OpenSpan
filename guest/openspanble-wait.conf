[Service]
# Reset the inherited ExecStartPre list, then: wait for the radio to exist,
# then configure dual-mode (BR/EDR for audio + LE for the iPad HID).
ExecStartPre=
ExecStartPre=/opt/openspan/wait-hci0.sh
ExecStartPre=/bin/sh -c 'btmgmt power off >/dev/null 2>&1; btmgmt bredr on >/dev/null 2>&1; btmgmt le on >/dev/null 2>&1; btmgmt power on >/dev/null 2>&1; sleep 1'
